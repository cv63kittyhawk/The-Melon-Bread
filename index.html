<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>The Melon Bread</title><style>body{font-family:system-ui,sans-serif;background:#f8f3e8;color:#2d2d2d;display:flex;justify-content:center;padding:20px}.app{max-width:720px;width:100%;background:#fff;border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}button{padding:12px 18px;border:none;border-radius:14px;background:#6aa84f;color:#fff;margin:8px;cursor:pointer}.choices{display:grid;gap:10px}.small{font-size:.9em;color:#666}</style></head><body><div class='app'><div id='screen'></div></div><script>const state={score:0};const screen=document.getElementById('screen');function render(html){screen.innerHTML=html}function start(){render(`<h1>🍈 The Melon Bread</h1><p>メロンパンを知らない天才</p><button onclick='role()'>Start</button>`)}function role(){render(`<h2>あなたは誰？</h2><div class='choices'><button onclick='q1()'>企画者</button><button onclick='q1()'>開発者</button></div>`)}function q1(){render(`<h2>Scene1: 伝え方</h2><div class='choices'><button onclick='pick(2,q2)'>図で伝える</button><button onclick='pick(1,q2)'>口頭で伝える</button><button onclick='pick(0,q2)'>雑に送る</button></div>`)}function q2(){render(`<h2>Scene2: 確認</h2><div class='choices'><button onclick='pick(2,q3)'>確認する</button><button onclick='pick(1,q3)'>空気で察する</button><button onclick='pick(0,q3)'>そのまま進める</button></div>`)}function q3(){render(`<h2>Scene3: 発売前</h2><div class='choices'><button onclick='pick(2,end)'>テスト販売</button><button onclick='pick(1,end)'>全国展開</button><button onclick='pick(0,end)'>上司判断で出す</button></div>`)}function pick(v,next){state.score+=v;next()}function end(){let t,s;if(state.score>=5){t='END A: 伝説のヒット商品';s='🍈 私は伝説のヒット商品を生みました。結果が良ければ、誤解も才能になる。 #メロンパンゲーム'}else if(state.score>=3){t='END C: 地味に成功';s='🍈 静かに利益を出しました。派手じゃない成功は語られない。 #メロンパンゲーム'}else if(state.score>=1){t='END D: 何も起きない';s='🍈 誰も傷つかず、誰にも届かなかった。 #メロンパンゲーム'}else{t='END B: 炎上会議';s='🍈 私は戦犯になりました。同じ行動でも、失敗すると罪になる。 #メロンパンゲーム'}render(`<h2>${t}</h2><p class='small'>${s}</p><button onclick='shareText(${JSON.stringify('')})'>シェアする</button><button onclick='restart()'>もう一度</button>`);window.currentShare=s}function shareText(){navigator.clipboard.writeText(window.currentShare);alert('シェア文をコピーしました');}function restart(){state.score=0;start()}start();</script></body></html>
